question: Koja je primarna uloga privatnog ključa u Bitcoin sistemu?
answer: Potpisivanje transakcije radi ispunjavanja uslova skripte
wrong_answers:
  - Služi kao identifikator za primanje bitkoina
  - Čuvanje sredstva sigurno na Blockchain-u
  - Kreiranje skripte zaključavanja za zaštitu bitkoina
explanation: |
  Privatni ključ se koristi za potpisivanje transakcija kako bi se zadovoljila skripta i otključali bitkoini.
reviewed: true
