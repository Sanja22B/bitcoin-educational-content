question: बिटकॉइन तक पहुंच देते समय क्या **नहीं** करना चाहिए?  

1. **पासवर्ड या प्राइवेट की किसी को भी बताना** – यह सीधे आपके बिटकॉइन चुरवा सकता है।  
2. **किसी को भी अपनी वॉलेट फाइल (wallet.dat) भेजना** – इससे कोई भी आपके सारे बिटकॉइन्स एक्सेस कर सकता है।  
3. **अनट्रस्टेड प्लेटफॉर्म या लोगों पर भरोसा करना** – स्कैमर्स आपको ठग सकते हैं।  
4. **बिना एन्क्रिप्शन के बैकअप स्टोर करना** – अगर कोई उसे ढूंढ ले, तो चोरी हो सकती है।  
5. **किसी को भी अपनी सीड फ्रेज़ (Seed Phrase) देना** – यह आपकी पूरी वॉलेट का कंट्रोल दे देता है।  

⚠️ **याद रखें:** बिटकॉइन में **"आपका की, आपका पैसा"** – अगर कोई आपकी प्राइवेट जानकारी ले लेता है, तो आपका पैसा खतरे में पड़ सकता है!
answer: एक व्यक्ति को Mnemonic वाक्यांश देना
wrong_answers:
  - कई लोगों के बीच जानकारी बाँटना
  - मुहरबंद अपारदर्शी लिफाफों का उपयोग करना
  - एक व्याख्यात्मक पत्र लिखना
explanation: |
  Mnemonic वाक्यांश को बिना किसी अतिरिक्त सुरक्षा के किसी एक व्यक्ति को सौंपने से आपके जीवनकाल में चोरी का खतरा काफी बढ़ जाता है।
