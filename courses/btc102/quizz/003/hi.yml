question: क्रिप्टोकरेंसी की दुनिया में "पंप एंड डंप" क्या होता है?  

यह एक ऐसी स्कीम है जहां कुछ लोग या ग्रुप मिलकर किसी खास कॉइन की कीमत को कृत्रिम तरीके से बढ़ाते (पंप) हैं, फिर अचानक अपने शेयर बेचकर (डंप) दूसरे निवेशकों को नुकसान में छोड़ देते हैं।  

**कैसे काम करता है?**  
1. **पंप:** बड़े खिलाड़ी (व्हेल्स) या इन्फ्लुएंसर किसी छोटी/कम जानी वाली कॉइन को टारगेट करते हैं, उसके बारे में झूठी अफवाहें या हाइप फैलाते हैं।  
2. **फोमो (FOMO):** छोटे निवेशक देखते हैं कि कीमत तेजी से बढ़ रही है और डर के मारे खरीदने लगते हैं।  
3. **डंप:** जब कीमत चरम पर पहुंचती है, तो यही बड़े खिलाड़ी अपने होल्डिंग्स बेच देते हैं, जिससे कीमत गिर जाती है और बाकी लोग घाटे में फंस जाते हैं।  

⚠️ **चेतावनी:** यह अवैध नहीं होता (हालांकि कुछ देशों में प्रतिबंधित है), लेकिन नैतिक रूप से गलत माना जाता है। नए निवेशक अक्सर इसके शिकार होते हैं।  

उदाहरण: 2017 में **Bitconnect** और 2021 में **Squid Game Token** जैसी घटनाएं।  

सावधान रहें, "टू गुड टू बी ट्रू" ऑफर से बचें! 🚨
answer: एक अभियान के ज़रिए किसी संपत्ति को चरम पर बेचने के लिए हेरफेर करना
wrong_answers:
