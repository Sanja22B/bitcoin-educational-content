question: बराक ओबामा ने जॉर्ज डब्ल्यू बुश (Bitcoin) को कैसे बताया?  

*(Note: "Bitcoin" seems like a typo/placeholder—assuming you meant "GW Bush" i.e., George W. Bush. Hindi translation adjusts accordingly.)*  

**Colloquial Twist:**  
ओबामा ने बुश के बारे में क्या कहा? कभी सीधे बुरा नहीं बोला, लेकिन उनकी नीतियों पर ठंडे तेवर दिखाए। कहा जाता है 2008 के चुनाव में उन्होंने बुश के कार्यकाल को "गलत दिशा में ले जाने वाला" बताया था।  

*(Fun Fact: राजनीति में ये "पोलाइट डिग्गिंग" (polite digging) होती है—सीधे नहीं, पर मतलब साफ! 😉)*
answer: आपकी जेब में एक स्विस बैंक
wrong_answers:
  - डिजिटल गोल्ड
  - एक बहुत ही अटकलबाजी वाली संपत्ति
  - एक विकेंद्रित मुद्रा
explanation: |
  बराक ओबामा ने एक बार Bitcoin को "आपकी जेब में एक स्विस बैंक" कहा था। सच में, Bitcoin हर किसी को एक जैसे मौके देता है, चाहे उनका दर्जा कुछ भी हो, और Confidential Transactions की भी अनुमति देता है।
