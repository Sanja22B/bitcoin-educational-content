question: बिटकॉइन की सुरक्षा सुनिश्चित करने के लिए निम्न चीज़ों से बिल्कुल बचना चाहिए:  

1. **प्राइवेट की को किसी के साथ शेयर न करें** – यह आपके वॉलेट तक पहुंच देता है।  
2. **फ़िशिंग वेबसाइट्स और स्कैम से सावधान रहें** – गलत लिंक पर क्लिक न करें।  
3. **अनजान सॉफ़्टवेयर या ऐप्स इंस्टॉल न करें** – मैलवेयर आपकी जानकारी चुरा सकता है।  
4. **पब्लिक वाई-फाई पर ट्रांजैक्शन न करें** – हैकर्स आपका डेटा इंटरसेप्ट कर सकते हैं।  
5. **कमजोर पासवर्ड या टू-फैक्टर ऑथेंटिकेशन न छोड़ें** – सुरक्षा बढ़ाएं।  
6. **अनट्रस्टेड एक्सचेंज या पर्सन पर भरोसा न करें** – स्कैम हो सकता है।  
7. **बैकअप न लेना** – अगर डिवाइस खो जाए, तो बिटकॉइन भी गए!  

सतर्क रहें और सुरक्षित रहें! 🔐
answer: अपने बिटकॉइन्स को Exchange प्लेटफॉर्म पर रखना
wrong_answers:
  - एक ओपन-सोर्स Hardware Wallet का उपयोग करके
  - रोज़मर्रा के लेन-देन के लिए Hot Wallet का इस्तेमाल करना
  - भंडारण के तरीकों में विविधता लाना
explanation: |
  "Not your keys, not your bitcoins" का सिद्धांत यह बताता है कि अपनी प्राइवेट कीज़ को खुद रखना कितना ज़रूरी है। Exchange प्लेटफॉर्म पर, आपके बिटकॉइन्स अनावश्यक जोखिम में होते हैं।
