question: एक हाइब्रिड होल्डर कौन-सी अधिग्रहण रणनीति अपना सकता है?
answer: डॉलर-कॉस्ट एवरेजिंग
wrong_answers:
  - एल्गोरिदमिक ट्रेडिंग
  - "अर्बिट्राज" (Arbitrage)
  - हैकिंग
explanation: |
  डॉलर-कॉस्ट एवरेजिंग से नियमित Bitcoin खरीदारी करके औसत खरीद मूल्य को समय के साथ संतुलित किया जा सकता है। होल्डर इसे कभी-कभार की गई बड़ी खरीदारियों के साथ भी जोड़ सकता है।
reviewed: false