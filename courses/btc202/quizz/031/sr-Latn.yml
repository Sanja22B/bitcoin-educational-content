question: Koja distribucija je najprikladnija za Raspberry Pi, s obzirom da ne zahteva puno kompjuterskih resursa?
answer: RaspiBlitz
wrong_answers:
  - Umbrel
  - MyNode
  - Start9
explanation: |
  RaspiBlitz je optimizovan za Raspberry Pi i ostaje lagan, za razliku od Umbrela, koji je postao previše težak za ove mašine.
reviewed: true
