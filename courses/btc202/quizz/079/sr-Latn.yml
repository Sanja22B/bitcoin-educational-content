question: Koja je maksimalna veličina blkNNNNN.dat fajla pre nego što se kreira novi fajl?
answer: 128 MB
wrong_answers:
  - 256 MB
  - 256 GB
  - 128 GB
explanation: |
  Fajlovi blkNNNNN.dat skladište blokove jedan za drugim i rastu do približno 128 MB, nakon čega Bitcoin Core kreira novi fajl.
reviewed: true
